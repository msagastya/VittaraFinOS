name: vittara_fin_os
description: "Track Wealth, Master Life"
publish_to: 'none'
version: 1.0.0+2012

environment:
  sdk: '>=3.1.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  lottie: ^3.1.2
  logger: ^2.6.2
  path_provider: ^2.1.2
  cupertino_icons: ^1.0.8
  google_fonts: ^6.1.0
  shared_preferences: ^2.5.4
  local_auth: ^3.0.0
  provider: ^6.1.5+1
  flutter_contacts: ^1.1.1
  permission_handler: ^11.4.0
  http: ^1.1.0
  sqflite: ^2.3.0
  path: ^1.8.3
  crypto: ^3.0.5
  # UI Enhancement Packages
  flutter_staggered_animations: ^1.1.1
  flutter_slidable: ^3.1.1
  smooth_page_indicator: ^1.2.0+3

  intl: any
  flutter_sms_inbox: ^1.0.4
  google_mlkit_entity_extraction: ^0.15.1
  flutter_local_notifications: ^18.0.0
  share_plus: ^10.1.4
  flutter_secure_storage: ^9.2.4
  pdf: ^3.10.8
  excel: ^4.0.2
  file_picker: ^8.1.2
  syncfusion_flutter_pdf: ^28.2.7
  # AI Intelligence System (Phase 1)
  device_info_plus: ^10.1.0
  # Phase 5 — Voice + OCR
  speech_to_text: ^7.0.0
  flutter_tts: ^4.0.0
  google_mlkit_text_recognition: ^0.15.0
  camera: ^0.11.0
  image_picker: ^1.1.2
dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/animations/loader.json
    - assets/remote_config.json
    - assets/app_icon.png
    - assets/fonts/Roboto-Regular.ttf
    - assets/fonts/Roboto-Bold.ttf
